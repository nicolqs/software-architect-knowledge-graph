name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          version: latest
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Typecheck (mypy)
        run: uv run mypy src
      - name: Test
        run: uv run pytest

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        # Version is driven by `packageManager` in the root package.json —
        # don't pass `version:` here too or the action errors on conflict.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install commitlint
        # Root has no pnpm-lock.yaml (the package.json there only hosts
        # commitlint + husky); skip frozen-lockfile + scripts.
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
